<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEPIO // Central Distribution Console</title>
    <style>
        :root {
            --bg-main: #ffffff;
            --bg-surface: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --accent-green: #16a34a;
            --font-mono: 'Courier New', Courier, monospace;
        }
        body { background: var(--bg-main); color: var(--text-main); font-family: var(--font-mono); font-size: 13px; padding: 40px; }
        header { border-bottom: 2px solid var(--text-main); padding-bottom: 16px; margin-bottom: 32px; }
        .form-container { max-width: 700px; background: var(--bg-surface); border: 1px solid var(--border-color); padding: 32px; box-shadow: 6px 6px 0px var(--text-main); }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 6px; text-transform: uppercase; font-size: 11px; color: var(--text-muted); }
        input[type="text"], textarea, select { width: 100%; padding: 10px; border: 1px solid var(--border-color); font-family: var(--font-mono); font-size: 13px; background: #ffffff; }
        textarea { height: 160px; resize: vertical; }
        .btn { background: var(--text-main); color: #ffffff; border: none; padding: 12px 24px; font-family: var(--font-mono); font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn:hover { background: #0284c7; }
        .status-box { margin-top: 20px; padding: 12px; border: 1px dashed var(--border-color); font-size: 12px; display: none; }
    </style>
</head>
<body>

    <header>
        <h2>STEPIO // CENTRAL DISPATCH TERMINAL</h2>
        <p style="color: var(--text-muted); font-size: 11px;">CROSS-REPOSITORY DISTRIBUTION SANDBOX // PRODUCTION CONTROL</p>
    </header>

    <div class="form-container">
        <div class="form-group">
            <label>1. GitHub Authority Token (PAT)</label>
            <input type="password" id="gh-token" style="width:100%; padding:10px;" placeholder="ghp_xxxxxxxxxxxx">
        </div>

        <div class="form-group">
            <label>2. Target Client Workspace Signature</label>
            <input type="text" id="client-id" placeholder="e.g., 160508" value="160508">
        </div>

        <div class="form-group">
            <label>3. Delivery Datestamp (Auto-Locked)</label>
            <input type="text" id="asset-date" readonly>
        </div>

        <div class="form-group">
            <label>4. Asset Content Format Classification</label>
            <select id="asset-type">
                <option value="TEXT">RAW TEXT MANIFEST</option>
                <option value="VIDEO">EXTERNAL VIDEO LINK (DRIVE)</option>
                <option value="GRAPHIC">EXTERNAL GRAPHIC LINK (DRIVE)</option>
            </select>
        </div>

        <div class="form-group">
            <label>5. Asset Document Title (EN / ZH)</label>
            <input type="text" id="title-en" placeholder="English Menu Title" style="margin-bottom: 8px;">
            <input type="text" id="title-zh" placeholder="中文菜单标题">
        </div>

        <div class="form-group">
            <label>6. External Storage Media Hyperlink (Google Drive / Dropbox)</label>
            <input type="text" id="media-url" placeholder="https://drive.google.com/file/d/...">
        </div>

        <div class="form-group">
            <label>7. Clean Text Payload Copy (English Body)</label>
            <textarea id="payload-en" placeholder="Paste generated text block here..."></textarea>
        </div>
        
        <div class="form-group">
            <label>8. Clean Text Payload Copy (Chinese Body)</label>
            <textarea id="payload-zh" placeholder="在此处粘贴生成的中文文本正文..."></textarea>
        </div>

        <button class="btn" onclick="executeDispatch()">// Dispatch Asset Pipeline</button>
        
        <div id="status-display" class="status-box"></div>
    </div>

    <script>
        // Set default current date automatically on load
        document.getElementById('asset-date').value = new Date().toISOString().split('T')[0];

        async function executeDispatch() {
            const token = document.getElementById('gh-token').value;
            const clientId = document.getElementById('client-id').value.trim();
            const date = document.getElementById('asset-date').value;
            const type = document.getElementById('asset-type').value;
            const titleEn = document.getElementById('title-en').value;
            const titleZh = document.getElementById('title-zh').value;
            const mediaUrl = document.getElementById('media-url').value;
            const payloadEn = document.getElementById('payload-en').value;
            const payloadZh = document.getElementById('payload-zh').value;
            
            const statusBox = document.getElementById('status-display');
            statusBox.style.display = "block";
            statusBox.innerText = "[PROCESSING] Mapping repository targets, fetching client structural matrix...";

            if(!token || !clientId) {
                statusBox.innerText = "[ERROR] Authority token and client identifier signature are strictly required.";
                return;
            }

            // Target Repository Definition Pathing Rules
            const owner = "stepio-scrapbooks";
            const repo = `workspace-${clientId}`; // Maps dynamically to individual client vaults
            const path = "data.js";
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

            try {
                // Step A: Pull the existing data.js configuration file from the target client repository
                let sha = "";
                let currentContent = "const clientWorkspaceData = [];";
                
                const getRes = await fetch(url, {
                    headers: { "Authorization": `token ${token}`, "Accept": "application/vnd.github.v3+json" }
                });

                if (getRes.ok) {
                    const getData = await getRes.json();
                    sha = getData.sha;
                    currentContent = atob(getData.content); // Decode base64 contents cleanly
                }

                // Step B: Generate the structured programmatic asset block object
                const uniqueId = `asset-${clientId}-${Date.now().toString().slice(-4)}`;
                
                const newAssetObj = {
                    id: uniqueId,
                    date: date,
                    type: type,
                    title: { en: titleEn || "Document", zh: titleZh || "文件" },
                    displayTitle: { en: titleEn || "Document", zh: titleZh || "文件" },
                    description: { en: "Dispatched from central operations terminal.", zh: "自中央控制台分发交付。" },
                    videoUrl: type === "VIDEO" ? mediaUrl : "",
                    imageUrl: type === "GRAPHIC" ? mediaUrl : "",
                    downloadUrl: mediaUrl || "#",
                    downloadLabel: type === "TEXT" ? "// View Manifest" : `// Download Raw Material (${type})`,
                    copyBoxTitle: { en: "Clean Text Output", zh: "净值内容输出" },
                    copyBoxContent: { en: payloadEn, zh: payloadZh }
                };

                // Step C: Parse old array format and append new data cleanly
                // Strips the assignment wrapper out to dynamically update the inner array list
                let innerArrayString = currentContent.replace(/const clientWorkspaceData\s*=\s*/, "").replace(/;/g, "").trim();
                let parsedArray = [];
                try {
                    parsedArray = JSON.parse(innerArrayString);
                } catch(e) {
                    // Fallback to array wrap if parsing empty or plain files
                    parsedArray = [];
                }

                // Push new item into the front of the chronological index matrix
                parsedArray.unshift(newAssetObj);
                
                const updatedFileContent = `const clientWorkspaceData = ${JSON.stringify(parsedArray, null, 4)};`;

                // Step D: Write new asset record back to target client storage via direct API PUT hook
                const putRes = await fetch(url, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: `SYSTEM DISPATCH // ADDED ASSET ${uniqueId}`,
                        content: btoa(unescape(encodeURIComponent(updatedFileContent))), // Clean base64 transfer encoding safety
                        sha: sha || undefined
                    })
                });

                if(putRes.ok) {
                    statusBox.style.color = "var(--accent-green)";
                    statusBox.innerText = `[SUCCESS] Asset successfully injected and synchronized into repository [${repo}] inside stepio-scrapbooks. Client pipeline live.`;
                } else {
                    const errData = await putRes.json();
                    statusBox.innerText = `[API ERROR] Commit execution failed: ${errData.message}`;
                }

            } catch (err) {
                statusBox.innerText = `[CRITICAL FAILURE] Pipeline crash: ${err.message}`;
            }
        }
    </script>
</body>
</html>
