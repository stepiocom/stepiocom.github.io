<!DOCTYPE html>
<html>
<head>
    <title>CENTRAL DISPATCH</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        .grid { display: flex; gap: 20px; }
        .column { flex: 1; border: 1px solid #000; padding: 15px; border-radius: 4px; }
        input, textarea { width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        button { width: 100%; padding: 10px; cursor: pointer; font-weight: bold; }
        #ui-status { padding: 15px; margin-bottom: 20px; border: 1px solid #000; display: none; font-weight: bold; }
    </style>
</head>
<body>
    <h3>CENTRAL DISPATCH</h3>
    <div id="ui-status"></div>
    <input type="password" id="token" placeholder="GitHub PAT">
    
    <div class="grid">
        <div class="column">
            <h4>BLOG</h4>
            <input type="text" id="title-BLOG" placeholder="Title">
            <textarea id="payload-BLOG" rows="4"></textarea>
            <button onclick="dispatch('BLOG')">DISPATCH BLOG</button>
        </div>
        <div class="column">
            <h4>DIARY</h4>
            <input type="text" id="title-DIARY" placeholder="Title">
            <textarea id="payload-DIARY" rows="4"></textarea>
            <button onclick="dispatch('DIARY')">DISPATCH DIARY</button>
        </div>
        <div class="column">
            <h4>VLOG</h4>
            <input type="text" id="title-VLOG" placeholder="Title">
            <textarea id="payload-VLOG" rows="4"></textarea>
            <button onclick="dispatch('VLOG')">DISPATCH VLOG</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const REPO = params.get('repo');
        const API_URL = `https://api.github.com/repos/stepiocom/${REPO}/contents/data.js`;

        function updateUI(msg, isError = false) {
            const el = document.getElementById('ui-status');
            el.style.display = 'block';
            el.style.backgroundColor = isError ? '#ffcccc' : '#ccffcc';
            el.innerText = msg;
        }

        async function dispatch(type) {
            const token = document.getElementById('token').value;
            if (!REPO) return updateUI("Error: No 'repo' specified in URL.", true);
            if (!token) return updateUI("Error: Missing GitHub PAT.", true);

            updateUI("Dispatching to " + REPO + "...");
            
            try {
                const res = await fetch(API_URL, { 
                    headers: { "Authorization": "token " + token, "Accept": "application/vnd.github.v3+json" } 
                });
                if (res.status === 401) throw new Error("401 Unauthorized: Check GitHub PAT.");
                
                const data = await res.json();
                const raw = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
                const jsonString = raw.substring(raw.indexOf('['), raw.lastIndexOf(']') + 1);
                let arr = JSON.parse(jsonString);

                arr.unshift({ 
                    id: Date.now(), 
                    date: new Date().toISOString().split('T')[0], 
                    type: type, 
                    title: { en: document.getElementById('title-' + type).value }, 
                    payload: document.getElementById('payload-' + type).value 
                });

                const newContent = "const clientWorkspaceData = " + JSON.stringify(arr, null, 4) + ";";
                const putRes = await fetch(API_URL, { 
                    method: "PUT", 
                    headers: { "Authorization": "token " + token, "Content-Type": "application/json" }, 
                    body: JSON.stringify({ 
                        message: "Dispatch " + type, 
                        content: btoa(unescape(encodeURIComponent(newContent))), 
                        sha: data.sha 
                    }) 
                });
                
                if (!putRes.ok) throw new Error("Failed to write to GitHub.");
                updateUI("Completed: " + type + " dispatched successfully.");
            } catch (e) {
                updateUI("Error: " + e.message, true);
            }
        }
    </script>
</body>
</html>
