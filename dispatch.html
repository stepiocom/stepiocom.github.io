<!DOCTYPE html>
<html>
<head>
    <title>STEPIO // CENTRAL DISPATCH</title>
    <style>
        body { font-family: monospace; padding: 20px; max-width: 800px; }
        .group { margin-bottom: 15px; }
        input, textarea, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 15px; cursor: pointer; width: 100%; margin-top: 10px; }
        #catalog { margin-top: 30px; border-top: 2px solid #000; padding-top: 10px; }
        .asset-card { border-bottom: 1px solid #ccc; padding: 10px 0; }
    </style>
</head>
<body>
    <h3>CENTRAL DISPATCH</h3>
    <div class="group"><label>GitHub PAT</label><input type="password" id="token"></div>
    <div class="group"><label>Type</label><select id="type"><option>BLOG</option><option>DIARY</option><option>VLOG</option></select></div>
    <div class="group"><label>Title (EN)</label><input type="text" id="title"></div>
    <div class="group"><label>Payload</label><textarea id="payload" rows="4"></textarea></div>
    
    <button onclick="dispatch()">DISPATCH ASSET</button>
    <button onclick="loadCatalog()">REFRESH ALL ASSETS</button>
    
    <div id="status"></div>
    <div id="catalog"></div>

    <script>
        const API_URL = "https://api.github.com/repos/stepiocom/stepioscrapbook-160508/contents/data.js";

        // Modern Unicode-safe encoding
        function safeBase64(str) {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode('0x' + p1)));
        }

        function safeDecode(str) {
            return decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
        }

        async function loadCatalog() {
            const token = document.getElementById('token').value;
            const catDiv = document.getElementById('catalog');
            catDiv.innerHTML = "Loading...";
            try {
                const res = await fetch(API_URL, { headers: { "Authorization": `token ${token}` } });
                const data = await res.json();
                const rawContent = safeDecode(data.content.replace(/\n/g, ''));
                const arr = JSON.parse(rawContent.substring(rawContent.indexOf('['), rawContent.lastIndexOf(']') + 1));
                
                catDiv.innerHTML = "<h4>MASTER CATALOG:</h4>";
                arr.forEach(a => {
                    catDiv.innerHTML += `<div class="asset-card"><strong>[${a.type}]</strong> ${a.title?.en || 'Untitled'} - ${a.date}</div>`;
                });
            } catch (e) { catDiv.innerHTML = "ERROR: " + e.message; }
        }

        async function dispatch() {
            const token = document.getElementById('token').value;
            const status = document.getElementById('status');
            const newAsset = { id: `a-${Date.now()}`, date: new Date().toISOString().split('T')[0], type: document.getElementById('type').value, title: { en: document.getElementById('title').value }, payload: document.getElementById('payload').value };

            try {
                const res = await fetch(API_URL, { headers: { "Authorization": `token ${token}` } });
                const data = await res.json();
                let arr = JSON.parse(safeDecode(data.content.replace(/\n/g, '')).substring(data.content.indexOf('['), data.content.lastIndexOf(']') + 1));
                arr.unshift(newAsset);
                
                await fetch(API_URL, { 
                    method: "PUT", 
                    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" }, 
                    body: JSON.stringify({ 
                        message: "Dispatch", 
                        content: safeBase64(`const clientWorkspaceData = ${JSON.stringify(arr, null, 4)};`), 
                        sha: data.sha 
                    }) 
                });
                status.innerText = "SUCCESS: Added.";
                loadCatalog();
            } catch (e) { status.innerText = "ERROR: " + e.message; }
        }
    </script>
</body>
</html>
