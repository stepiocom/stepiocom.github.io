<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CENTRAL DISPATCH // STEPIO</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; max-width: 1200px; margin: auto; background: #fff; }
        .grid { display: flex; gap: 20px; width: 100%; margin-top: 20px; }
        .column { flex: 1; border: 1px solid #ccc; padding: 20px; border-radius: 8px; background: #f9f9f9; }
        .group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #000; }
        #token { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .asset-card { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 0.85em; }
    </style>
</head>
<body onload="loadCatalog()">

    <h3>CENTRAL DISPATCH</h3>
    <input type="password" id="token" placeholder="Enter GitHub PAT">

    <div class="grid">
        <div class="column">
            <h4>BLOG</h4>
            <div class="group"><label>Title:</label><input type="text" id="title-BLOG"></div>
            <div class="group"><label>Payload:</label><textarea id="payload-BLOG" rows="5"></textarea></div>
            <button onclick="dispatch('BLOG')">DISPATCH BLOG</button>
            <div id="list-BLOG"></div>
        </div>

        <div class="column">
            <h4>DIARY</h4>
            <div class="group"><label>Title:</label><input type="text" id="title-DIARY"></div>
            <div class="group"><label>Payload:</label><textarea id="payload-DIARY" rows="5"></textarea></div>
            <button onclick="dispatch('DIARY')">DISPATCH DIARY</button>
            <div id="list-DIARY"></div>
        </div>

        <div class="column">
            <h4>VLOG</h4>
            <div class="group"><label>Title:</label><input type="text" id="title-VLOG"></div>
            <div class="group"><label>Payload:</label><textarea id="payload-VLOG" rows="5"></textarea></div>
            <button onclick="dispatch('VLOG')">DISPATCH VLOG</button>
            <div id="list-VLOG"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://api.github.com/repos/stepiocom/stepioscrapbook-160508/contents/data.js";
        function b64(s) { return btoa(unescape(encodeURIComponent(s))); }
        function atob64(s) { return decodeURIComponent(escape(atob(s))); }

        async function loadCatalog() {
            const token = document.getElementById('token').value;
            if(!token) return;
            try {
                const res = await fetch(API_URL, { headers: {"Authorization": `token ${token}`} });
                const data = await res.json();
                const raw = atob64(data.content.replace(/\n/g, ''));
                const arr = JSON.parse(raw.substring(raw.indexOf('['), raw.lastIndexOf(']') + 1));
                ['BLOG', 'DIARY', 'VLOG'].forEach(t => document.getElementById(`list-${t}`).innerHTML = "");
                arr.forEach(a => {
                    const el = document.getElementById(`list-${a.type.toUpperCase()}`);
                    if(el) el.innerHTML += `<div class="asset-card"><strong>${a.title.en}</strong> (${a.date})</div>`;
                });
            } catch(e) { console.log("Load failed, check token."); }
        }

        async function dispatch(type) {
            const token = document.getElementById('token').value;
            const res = await fetch(API_URL, { headers: {"Authorization": `token ${token}`} });
            const data = await res.json();
            const raw = atob64(data.content.replace(/\n/g, ''));
            let arr = JSON.parse(raw.substring(raw.indexOf('['), raw.lastIndexOf(']') + 1));
            
            arr.unshift({ 
                id: Date.now(), 
                date: new Date().toISOString().split('T')[0], 
                type: type, 
                title: { en: document.getElementById(`title-${type}`).value }, 
                payload: document.getElementById(`payload-${type}`).value 
            });

            await fetch(API_URL, { 
                method: "PUT", 
                headers: {"Authorization": `token ${token}`, "Content-Type": "application/json"}, 
                body: JSON.stringify({ 
                    message: "Dispatching " + type, 
                    content: b64(`const clientWorkspaceData = ${JSON.stringify(arr, null, 4)};`), 
                    sha: data.sha 
                }) 
            });
            loadCatalog();
        }
    </script>
</body>
</html>
