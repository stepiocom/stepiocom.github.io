<!DOCTYPE html>
<html>
<head>
    <title>STEPIO // CENTRAL DISPATCH</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        .grid { display: flex; gap: 20px; }
        .column { flex: 1; border: 1px solid #000; padding: 15px; }
        .group { margin-bottom: 10px; }
        input, textarea { width: 100%; box-sizing: border-box; padding: 5px; }
        button { width: 100%; padding: 10px; margin-top: 5px; font-weight: bold; cursor: pointer; }
        .asset-card { border-bottom: 1px solid #ccc; padding: 8px 0; font-size: 0.85em; }
    </style>
</head>
<body onload="loadCatalog()">
    <h3>CENTRAL DISPATCH</h3>
    <label>GitHub PAT:</label><input type="password" id="token" style="width: 300px; margin-bottom: 20px;">
    
    <div class="grid">
        <div class="column" id="col-BLOG">
            <h4>BLOG</h4>
            <div class="group"><label>Title:</label><input type="text" id="title-BLOG"></div>
            <div class="group"><label>Payload:</label><textarea id="payload-BLOG" rows="4"></textarea></div>
            <button onclick="dispatch('BLOG')">DISPATCH BLOG</button>
            <div id="list-BLOG"></div>
        </div>

        <div class="column" id="col-DIARY">
            <h4>DIARY</h4>
            <div class="group"><label>Title:</label><input type="text" id="title-DIARY"></div>
            <div class="group"><label>Payload:</label><textarea id="payload-DIARY" rows="4"></textarea></div>
            <button onclick="dispatch('DIARY')">DISPATCH DIARY</button>
            <div id="list-DIARY"></div>
        </div>

        <div class="column" id="col-VLOG">
            <h4>VLOG</h4>
            <div class="group"><label>Title:</label><input type="text" id="title-VLOG"></div>
            <div class="group"><label>Payload:</label><textarea id="payload-VLOG" rows="4"></textarea></div>
            <button onclick="dispatch('VLOG')">DISPATCH VLOG</button>
            <div id="list-VLOG"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://api.github.com/repos/stepiocom/stepioscrapbook-160508/contents/data.js";
        function safeBase64(str) { return btoa(unescape(encodeURIComponent(str))); }
        function safeDecode(str) { return decodeURIComponent(escape(atob(str))); }

        async function loadCatalog() {
            const token = document.getElementById('token').value;
            try {
                const res = await fetch(API_URL, { headers: { "Authorization": `token ${token}` } });
                const data = await res.json();
                const rawContent = safeDecode(data.content.replace(/\n/g, ''));
                const arr = JSON.parse(rawContent.substring(rawContent.indexOf('['), rawContent.lastIndexOf(']') + 1));
                
                ['BLOG', 'DIARY', 'VLOG'].forEach(type => document.getElementById(`list-${type}`).innerHTML = "");
                arr.forEach(a => {
                    const list = document.getElementById(`list-${a.type.toUpperCase()}`);
                    if (list) list.innerHTML += `<div class="asset-card"><strong>${a.title?.en || a.title}</strong> <em>(${a.date})</em></div>`;
                });
            } catch (e) { console.log("Load error"); }
        }

        async function dispatch(type) {
            const token = document.getElementById('token').value;
            const res = await fetch(API_URL, { headers: { "Authorization": `token ${token}` } });
            const data = await res.json();
            const rawContent = safeDecode(data.content.replace(/\n/g, ''));
            let arr = JSON.parse(rawContent.substring(rawContent.indexOf('['), rawContent.lastIndexOf(']') + 1));
            
            arr.unshift({ 
                id: `a-${Date.now()}`, date: new Date().toISOString().split('T')[0], 
                type: type, 
                title: { en: document.getElementById(`title-${type}`).value }, 
                payload: document.getElementById(`payload-${type}`).value 
            });

            await fetch(API_URL, { 
                method: "PUT", 
                headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" }, 
                body: JSON.stringify({ message: "Dispatch", content: safeBase64(`const clientWorkspaceData = ${JSON.stringify(arr, null, 4)};`), sha: data.sha }) 
            });
            loadCatalog();
        }
    </script>
</body>
</html>
