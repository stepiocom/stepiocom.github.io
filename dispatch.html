<!DOCTYPE html>
<html>
<head>
    <title>CENTRAL DISPATCH</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .grid { display: flex; gap: 20px; }
        .column { flex: 1; border: 1px solid #000; padding: 15px; }
        input, textarea { width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        button { width: 100%; padding: 10px; font-weight: bold; cursor: pointer; }
        #status { padding: 15px; margin-bottom: 20px; border: 1px solid #000; display: none; }
    </style>
</head>
<body>
    <h3>CENTRAL DISPATCH</h3>
    <div id="status"></div>
    <input type="text" id="client-code" placeholder="Enter 6-digit Code (e.g., 160508)">
    <input type="password" id="token" placeholder="GitHub PAT">
    
    <div class="grid">
        <div class="column">
            <h4>BLOG</h4>
            <textarea id="payload-BLOG" rows="4"></textarea>
            <button onclick="dispatch('BLOG')">DISPATCH BLOG</button>
        </div>
        <div class="column">
            <h4>DIARY</h4>
            <textarea id="payload-DIARY" rows="4"></textarea>
            <button onclick="dispatch('DIARY')">DISPATCH DIARY</button>
        </div>
        <div class="column">
            <h4>VLOG</h4>
            <textarea id="payload-VLOG" rows="4"></textarea>
            <button onclick="dispatch('VLOG')">DISPATCH VLOG</button>
        </div>
    </div>

    <script>
        function updateStatus(msg, isError = false) {
            const el = document.getElementById('status');
            el.style.display = 'block';
            el.style.backgroundColor = isError ? '#ffcccc' : '#ccffcc';
            el.innerText = msg;
        }

        async function dispatch(type) {
            const code = document.getElementById('client-code').value;
            const token = document.getElementById('token').value;
            const payload = document.getElementById('payload-'+type).value;
            
            if (!code || code.length !== 6) return updateStatus("Error: 6-digit code required.", true);
            if (!token) return updateStatus("Error: PAT required.", true);
            
            const apiUrl = `https://api.github.com/repos/stepiocom/stepioscrapbook-${code}/contents/data.js`;
            updateStatus("Connecting to " + code + "...");

            try {
                const res = await fetch(apiUrl, { 
                    headers: { 
                        "Authorization": "token " + token,
                        "Accept": "application/vnd.github.v3+json"
                    } 
                });
                
                if (res.status === 404) throw new Error("404: File/Repo not found. Check if repo name is 'stepioscrapbook-" + code + "'");
                if (res.status === 401) throw new Error("401: Unauthorized. Check PAT 'repo' permissions.");
                if (!res.ok) throw new Error("GitHub Error: " + res.status);
                
                const data = await res.json();
                const raw = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
                let arr = JSON.parse(raw.substring(raw.indexOf('['), raw.lastIndexOf(']') + 1));
                
                arr.unshift({ id: Date.now(), type, payload });
                
                await fetch(apiUrl, { 
                    method: "PUT", 
                    headers: { "Authorization": "token " + token, "Content-Type": "application/json" }, 
                    body: JSON.stringify({ 
                        message: "Update " + type, 
                        content: btoa(unescape(encodeURIComponent("const clientWorkspaceData = " + JSON.stringify(arr, null, 4) + ";"))), 
                        sha: data.sha 
                    }) 
                });
                updateStatus("Successfully dispatched to " + code);
            } catch(e) { updateStatus("Error: " + e.message, true); }
        }
    </script>
</body>
</html>
