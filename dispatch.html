<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Dispatch</title>
    <link rel="icon" href="29083386.png" type="image/png">
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; width: 100%; box-sizing: border-box; }
        input, textarea { width: 100%; box-sizing: border-box; margin-bottom: 10px; padding: 10px; }
        button { width: 100%; padding: 12px; cursor: pointer; background: #333; color: white; border: none; }
        #status { padding: 10px; margin-bottom: 15px; display: none; text-align: center; }
    </style>
</head>
<body>
    <h2>MASTER DISPATCH</h2>
    <div id="status"></div>
    
    <input type="text" id="client-code" placeholder="Client ID (e.g., 160508)">
    <input type="password" id="token" placeholder="GitHub PAT Token">
    <hr>
    
    <div class="box">
        <h3>BLOG</h3>
        <input type="text" id="title-BLOG" placeholder="Blog Title">
        <textarea id="payload-BLOG" rows="4" placeholder="Blog Content..."></textarea>
        <button onclick="dispatch('BLOG')">DISPATCH BLOG</button>
    </div>

    <div class="box">
        <h3>DIARY</h3>
        <input type="text" id="title-DIARY" placeholder="Diary Title">
        <textarea id="payload-DIARY" rows="4" placeholder="Diary Content..."></textarea>
        <button onclick="dispatch('DIARY')">DISPATCH DIARY</button>
    </div>

    <div class="box">
        <h3>VLOG</h3>
        <input type="text" id="title-VLOG" placeholder="Vlog Title">
        <textarea id="payload-VLOG" rows="4" placeholder="Vlog Content..."></textarea>
        <button onclick="dispatch('VLOG')">DISPATCH VLOG</button>
    </div>

    <script>
        async function dispatch(type) {
            const code = document.getElementById('client-code').value;
            const token = document.getElementById('token').value;
            const title = document.getElementById('title-' + type).value;
            const payload = document.getElementById('payload-' + type).value;
            const status = document.getElementById('status');
            
            if(!code || !token) { alert("Please enter Client ID and Token"); return; }
            const apiUrl = `https://api.github.com/repos/stepiocom/stepioscrapbook-${code}/contents/data.js`;
            
            try {
                status.style.display = 'block'; status.innerText = "Dispatching...";
                status.style.background = '#fff3cd';

                const response = await fetch(apiUrl, { headers: { "Authorization": "token " + token } });
                const data = await response.json();
                const raw = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ""))));
                let arr = JSON.parse(raw.substring(raw.indexOf('['), raw.lastIndexOf(']') + 1));
                
                arr.unshift({ id: Date.now(), type: type, title: { en: title }, payload: payload });
                
                await fetch(apiUrl, { 
                    method: "PUT", 
                    headers: { "Authorization": "token " + token, "Content-Type": "application/json" }, 
                    body: JSON.stringify({ 
                        message: "Update " + type, 
                        content: btoa(unescape(encodeURIComponent("const clientWorkspaceData = " + JSON.stringify(arr, null, 4) + ";"))), 
                        sha: data.sha 
                    }) 
                });
                status.style.background = '#d4edda'; status.innerText = "Success! Dispatched " + type + " to " + code;
            } catch (e) {
                status.style.background = '#f8d7da'; status.innerText = "Error: " + e.message;
            }
        }
    </script>
</body>
</html>
