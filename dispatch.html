<!DOCTYPE html>
<html>
<head>
    <title>MASTER DISPATCH</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .grid { display: flex; gap: 20px; }
        .column { flex: 1; border: 1px solid #ccc; padding: 15px; border-radius: 8px; }
        input, textarea { width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        button { width: 100%; padding: 10px; cursor: pointer; }
        #status-box { padding: 15px; background: #f0f0f0; border: 1px solid #333; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>
    <h3>MASTER DISPATCH</h3>
    <div id="status-box"></div>
    
    <input type="password" id="token" placeholder="GitHub PAT">
    <select id="client-select" onchange="updateRepo()"></select>

    <div class="grid">
        <div class="column">
            <h4>BLOG</h4>
            <input type="text" id="title-BLOG">
            <textarea id="payload-BLOG" rows="4"></textarea>
            <button onclick="dispatch('BLOG')">DISPATCH BLOG</button>
        </div>
        <div class="column">
            <h4>DIARY</h4>
            <input type="text" id="title-DIARY">
            <textarea id="payload-DIARY" rows="4"></textarea>
            <button onclick="dispatch('DIARY')">DISPATCH DIARY</button>
        </div>
        <div class="column">
            <h4>VLOG</h4>
            <input type="text" id="title-VLOG">
            <textarea id="payload-VLOG" rows="4"></textarea>
            <button onclick="dispatch('VLOG')">DISPATCH VLOG</button>
        </div>
    </div>

    <script>
        let clients = {};
        let activeApiUrl = "";

        // Load client map on startup
        async function init() {
            const res = await fetch('clients.json');
            clients = await res.json();
            const select = document.getElementById('client-select');
            Object.keys(clients).forEach(repo => {
                const opt = document.createElement('option');
                opt.value = repo; opt.innerText = repo;
                select.appendChild(opt);
            });
            updateRepo();
        }

        function updateRepo() {
            activeApiUrl = clients[document.getElementById('client-select').value];
        }

        function log(msg, err = false) {
            const el = document.getElementById('status-box');
            el.style.display = 'block';
            el.style.color = err ? 'red' : 'green';
            el.innerText = msg;
        }

        async function dispatch(type) {
            const token = document.getElementById('token').value;
            const title = document.getElementById('title-'+type).value;
            const payload = document.getElementById('payload-'+type).value;

            log("Fetching target...");
            try {
                const res = await fetch(activeApiUrl, { headers: {"Authorization": "token " + token} });
                if(!res.ok) throw new Error("Unauthorized or Repo Not Found");
                
                const data = await res.json();
                const raw = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
                let arr = JSON.parse(raw.substring(raw.indexOf('['), raw.lastIndexOf(']') + 1));
                
                arr.unshift({ id: Date.now(), type, title: { en: title }, payload });
                
                log("Pushing to GitHub...");
                await fetch(activeApiUrl, { 
                    method: "PUT", 
                    headers: {"Authorization": "token " + token, "Content-Type": "application/json"}, 
                    body: JSON.stringify({ 
                        message: "Dispatch " + type, 
                        content: btoa(unescape(encodeURIComponent("const clientWorkspaceData = " + JSON.stringify(arr, null, 4) + ";"))), 
                        sha: data.sha 
                    }) 
                });
                log("Success: Dispatched to " + document.getElementById('client-select').value);
            } catch(e) { log(e.message, true); }
        }
        init();
    </script>
</body>
</html>
