<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEPIO // Central Distribution Console</title>
    <style>
        :root {
            --bg-main: #ffffff;
            --bg-surface: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --accent-green: #16a34a;
            --font-mono: 'Courier New', Courier, monospace;
        }
        body { background: var(--bg-main); color: var(--text-main); font-family: var(--font-mono); font-size: 13px; padding: 40px; }
        header { border-bottom: 2px solid var(--text-main); padding-bottom: 16px; margin-bottom: 32px; }
        .form-container { max-width: 700px; background: var(--bg-surface); border: 1px solid var(--border-color); padding: 32px; box-shadow: 6px 6px 0px var(--text-main); }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 6px; text-transform: uppercase; font-size: 11px; color: var(--text-muted); }
        input[type="text"], input[type="password"], textarea, select { width: 100%; padding: 10px; border: 1px solid var(--border-color); font-family: var(--font-mono); font-size: 13px; background: #ffffff; }
        textarea { height: 220px; resize: vertical; }
        .btn { background: var(--text-main); color: #ffffff; border: none; padding: 12px 24px; font-family: var(--font-mono); font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn:hover { background: #0284c7; }
        .status-box { margin-top: 20px; padding: 12px; border: 1px dashed var(--border-color); font-size: 12px; display: none; line-height: 1.5; white-space: pre-wrap; }
    </style>
</head>
<body>

    <header>
        <h2>STEPIO // CENTRAL DISPATCH TERMINAL</h2>
        <p style="color: var(--text-muted); font-size: 11px;">CROSS-REPOSITORY AUTOMATED TRANSLATION PIPELINE // PRODUCTION CONTROL</p>
    </header>

    <div class="form-container">
        <div class="form-group">
            <label>1. GitHub Authority Token (PAT)</label>
            <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx">
        </div>

        <div class="form-group">
            <label>2. Target Client Workspace Signature</label>
            <input type="text" id="client-id" placeholder="e.g., 160508" value="160508">
        </div>

        <div class="form-group">
            <label>3. Delivery Datestamp</label>
            <input type="text" id="asset-date" readonly>
        </div>

        <div class="form-group">
            <label>4. Asset Content Format Classification</label>
            <select id="asset-type">
                <option value="TEXT">RAW TEXT MANIFEST</option>
                <option value="VIDEO">EXTERNAL VIDEO LINK (DRIVE)</option>
                <option value="GRAPHIC">EXTERNAL GRAPHIC LINK (DRIVE)</option>
            </select>
        </div>

        <div class="form-group">
            <label>5. Asset Document Title (English Only)</label>
            <input type="text" id="title-en" placeholder="e.g., Morning Brief">
        </div>

        <div class="form-group">
            <label>6. External Storage Media Hyperlink (Google Drive / Dropbox)</label>
            <input type="text" id="media-url" placeholder="https://drive.google.com/file/d/...">
        </div>

        <div class="form-group">
            <label>7. Master English Text Payload</label>
            <textarea id="payload-en" placeholder="Paste single master English content block here..."></textarea>
        </div>

        <button class="btn" onclick="executeDispatch()">// Translate & Dispatch Asset</button>
        
        <div id="status-display" class="status-box"></div>
    </div>

    <script>
        document.getElementById('asset-date').value = new Date().toISOString().split('T')[0];

        // Helper function to translate text via public API blocks sequentially
        async function fetchTranslation(text, targetLang) {
            if (!text.trim()) return "";
            try {
                // Splits massive documents safely into paragraphs to bypass basic API string limits
                const paragraphs = text.split('\n');
                const translatedParagraphs = await Promise.all(paragraphs.map(async (para) => {
                    if (!para.trim()) return "";
                    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(para)}&langpair=en|${targetLang}`);
                    if (!res.ok) return para;
                    const data = await res.json();
                    return data.responseData.translatedText || para;
                }));
                return translatedParagraphs.join('\n');
            } catch (e) {
                return text; // Fallback to raw text if connection flickers
            }
        }

        async function executeDispatch() {
            const token = document.getElementById('gh-token').value;
            const clientId = document.getElementById('client-id').value.trim();
            const date = document.getElementById('asset-date').value;
            const type = document.getElementById('asset-type').value;
            const titleEn = document.getElementById('title-en').value || "Document";
            const mediaUrl = document.getElementById('media-url').value;
            const payloadEn = document.getElementById('payload-en').value;
            
            const statusBox = document.getElementById('status-display');
            statusBox.style.display = "block";
            statusBox.style.color = "var(--text-main)";
            statusBox.innerText = "[TRANSLATING] Processing automated English structural analysis into localized matrices (ZH, JA, FR)...";

            if(!token || !clientId) {
                statusBox.innerText = "[ERROR] Authority token and client identifier signature are strictly required.";
                return;
            }

            // Execute on-the-fly parallel translation sequence
            let titleZh = titleEn, titleJa = titleEn, titleFr = titleEn;
            let payloadZh = payloadEn, payloadJa = payloadEn, payloadFr = payloadEn;

            try {
                // Sequential execution to keep public API gateways steady
                titleZh = await fetchTranslation(titleEn, "zh");
                titleJa = await fetchTranslation(titleEn, "ja");
                titleFr = await fetchTranslation(titleEn, "fr");

                payloadZh = await fetchTranslation(payloadEn, "zh");
                payloadJa = await fetchTranslation(payloadEn, "ja");
                payloadFr = await fetchTranslation(payloadEn, "fr");
                
                statusBox.innerText = "[TRANSLATION COMPLETE] Accessing client vault repository architecture...";
            } catch (err) {
                statusBox.innerText = "[WARNING] Translation gateway timed out. Defaulting localized nodes to base template...";
            }

            const owner = "stepio-scrapbooks";
            const repo = `workspace-${clientId}`;
            const path = "data.js";
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

            try {
                let sha = "";
                let currentContent = "const clientWorkspaceData = [];";
                
                const getRes = await fetch(url, {
                    headers: { "Authorization": `token ${token}`, "Accept": "application/vnd.github.v3+json" }
                });

                if (getRes.ok) {
                    const getData = await getRes.json();
                    sha = getData.sha;
                    currentContent = atob(getData.content);
                }

                const uniqueId = `asset-${clientId}-${Date.now().toString().slice(-4)}`;
                
                // Formulate complete multi-lingual ledger object dynamically out of the translation loops
                const newAssetObj = {
                    id: uniqueId,
                    date: date,
                    type: type,
                    title: { en: titleEn, zh: titleZh, ja: titleJa, fr: titleFr },
                    description: { 
                        en: "Dispatched from central operations terminal.", 
                        zh: "自中央控制台分发交付。",
                        ja: "中央運用ターミナルから配信されました。",
                        fr: "Distribué depuis le terminal des opérations centrales."
                    },
                    downloadUrl: mediaUrl || "#",
                    downloadLabel: type === "TEXT" ? "// View Manifest" : `// Open Shared Media Vault (${type})`,
                    copyBoxTitle: { en: "Clean Text Output", zh: "净值内容输出", ja: "クリーンテキスト出力", fr: "Contenu de sortie" },
                    copyBoxContent: { en: payloadEn, zh: payloadZh, ja: payloadJa, fr: payloadFr }
                };

                let innerArrayString = currentContent.replace(/const clientWorkspaceData\s*=\s*/, "").replace(/;/g, "").trim();
                let parsedArray = [];
                try {
                    parsedArray = JSON.parse(innerArrayString);
                } catch(e) {
                    parsedArray = [];
                }

                parsedArray.unshift(newAssetObj);
                const updatedFileContent = `const clientWorkspaceData = ${JSON.stringify(parsedArray, null, 4)};`;

                const putRes = await fetch(url, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: `SYSTEM AUTOMATION DISPATCH // ADDED ASSET ${uniqueId}`,
                        content: btoa(unescape(encodeURIComponent(updatedFileContent))),
                        sha: sha || undefined
                    })
                });

                if(putRes.ok) {
                    statusBox.style.color = "var(--accent-green)";
                    statusBox.innerText = `[SUCCESS] Automated translation injection finalized.\nTarget Repository: [${repo}]\nLanguages Localized: EN, ZH, JA, FR.\nClient workspace updated instantly.`;
                } else {
                    const errData = await putRes.json();
                    statusBox.innerText = `[API ERROR] Commit execution failed: ${errData.message}`;
                }

            } catch (err) {
                statusBox.innerText = `[CRITICAL FAILURE] Pipeline crash: ${err.message}`;
            }
        }
    </script>
</body>
</html>
