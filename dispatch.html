<!DOCTYPE html>
<html>
<head>
    <title>MASTER DISPATCH</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .grid { display: flex; gap: 20px; }
        .column { flex: 1; border: 1px solid #000; padding: 15px; }
        input, textarea { width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        textarea { height: 100px; }
        button { width: 100%; padding: 10px; cursor: pointer; font-weight: bold; }
        #status { padding: 10px; margin-bottom: 10px; border: 1px solid #000; display: none; }
    </style>
</head>
<body>
    <h3>MASTER DISPATCH</h3>
    <div id="status"></div>
    <input type="text" id="client-code" placeholder="6-digit Client Code (e.g., 160508)">
    <input type="password" id="token" placeholder="Paste your GitHub PAT here">
    
    <div class="grid">
        <div class="column">
            <h4>BLOG</h4>
            <input type="text" id="title-BLOG" placeholder="Title">
            <textarea id="payload-BLOG"></textarea>
            <button onclick="dispatch('BLOG')">DISPATCH BLOG</button>
        </div>
        <div class="column">
            <h4>DIARY</h4>
            <input type="text" id="title-DIARY" placeholder="Title">
            <textarea id="payload-DIARY"></textarea>
            <button onclick="dispatch('DIARY')">DISPATCH DIARY</button>
        </div>
        <div class="column">
            <h4>VLOG</h4>
            <input type="text" id="title-VLOG" placeholder="Title">
            <textarea id="payload-VLOG"></textarea>
            <button onclick="dispatch('VLOG')">DISPATCH VLOG</button>
        </div>
    </div>

    <script>
        async function dispatch(type) {
            const status = document.getElementById('status');
            const code = document.getElementById('client-code').value;
            const token = document.getElementById('token').value;
            const title = document.getElementById('title-'+type).value;
            const payload = document.getElementById('payload-'+type).value;

            status.style.display = 'block';
            status.innerText = "Dispatching...";

            const url = `https://api.github.com/repos/stepiocom/stepioscrapbook-${code}/contents/data.js`;

            try {
                const response = await fetch(url, {
                    headers: {
                        "Authorization": "Bearer " + token,
                        "Accept": "application/vnd.github.v3+json"
                    }
                });

                if (!response.ok) throw new Error("GitHub error: " + response.status + ". Check Token/Repo name.");

                const data = await response.json();
                const raw = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
                let arr = JSON.parse(raw.substring(raw.indexOf('['), raw.lastIndexOf(']') + 1));

                arr.unshift({ id: Date.now(), type, title: { en: title }, payload });

                const putResponse = await fetch(url, {
                    method: "PUT",
                    headers: {
                        "Authorization": "Bearer " + token,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: "Auto-dispatch " + type,
                        content: btoa(unescape(encodeURIComponent("const clientWorkspaceData = " + JSON.stringify(arr, null, 4) + ";"))),
                        sha: data.sha
                    })
                });

                if (putResponse.ok) {
                    status.style.backgroundColor = '#ccffcc';
                    status.innerText = "Success! Content dispatched to " + code;
                } else {
                    throw new Error("Failed to write to GitHub.");
                }
            } catch (err) {
                status.style.backgroundColor = '#ffcccc';
                status.innerText = err.message;
            }
        }
    </script>
</body>
</html>
