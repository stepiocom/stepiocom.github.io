<button class="btn" style="margin-top:10px; background:#444;" onclick="viewCatalog()">// VIEW ALL ASSETS</button>
<div id="catalog-view" style="margin-top:20px; border-top:1px solid #000; padding-top:10px;"></div>

<script>
    // Existing dispatch() function remains the same...

    async function viewCatalog() {
        const token = document.getElementById('token').value;
        const wsId = document.getElementById('ws-id').value;
        const catalog = document.getElementById('catalog-view');
        const url = `https://api.github.com/repos/stepiocom/stepioscrapbook-${wsId}/contents/data.js`;

        catalog.innerText = "[LOADING] Fetching all assets...";

        try {
            const res = await fetch(url, { headers: { "Authorization": `token ${token}` } });
            const data = await res.json();
            const content = JSON.parse(atob(data.content.replace(/\n/g, '')).replace('const clientWorkspaceData = ', '').replace(';', ''));
            
            // Generate list
            let html = "<h4>CURRENT ASSETS:</h4><ul>";
            content.forEach(item => {
                html += `<li><strong>[${item.type}]</strong> ${item.title} <small>(${item.date})</small></li>`;
            });
            html += "</ul>";
            catalog.innerHTML = html;
        } catch (err) {
            catalog.innerText = "[ERROR] Could not load catalog: " + err.message;
        }
    }
</script>
