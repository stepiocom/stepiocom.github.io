<!DOCTYPE html>
<html>
<head>
    <title>STEPIO // CENTRAL DISPATCH</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        .grid-container { display: flex; gap: 20px; }
        .column { flex: 1; border: 1px solid #ccc; padding: 10px; }
        .input-area { margin-bottom: 20px; border-bottom: 2px solid #000; padding-bottom: 20px; }
        .asset-card { border-bottom: 1px solid #eee; padding: 5px 0; font-size: 0.9em; }
    </style>
</head>
<body onload="loadCatalog()">
    <h3>CENTRAL DISPATCH</h3>
    <div class="input-area">
        <label>GitHub PAT:</label><input type="password" id="token" style="width:100%"><br>
        <label>Type:</label><input type="text" id="type" placeholder="BLOG / DIARY / VLOG" style="width:100%"><br>
        <label>Title:</label><input type="text" id="title" style="width:100%"><br>
        <label>Payload:</label><textarea id="payload" rows="3" style="width:100%"></textarea>
        <button onclick="dispatch()" style="width:100%; padding:10px; margin-top:5px;">DISPATCH ASSET</button>
        <div id="status"></div>
    </div>

    <div class="grid-container">
        <div class="column" id="col-BLOG"><h4>BLOGS</h4></div>
        <div class="column" id="col-DIARY"><h4>DIARIES</h4></div>
        <div class="column" id="col-VLOG"><h4>VLOGS</h4></div>
    </div>

    <script>
        const API_URL = "https://api.github.com/repos/stepiocom/stepioscrapbook-160508/contents/data.js";
        function safeBase64(str) { return btoa(unescape(encodeURIComponent(str))); }
        function safeDecode(str) { return decodeURIComponent(escape(atob(str))); }

        async function loadCatalog() {
            const token = document.getElementById('token').value;
            try {
                const res = await fetch(API_URL, { headers: { "Authorization": `token ${token}` } });
                const data = await res.json();
                const rawContent = safeDecode(data.content.replace(/\n/g, ''));
                const arr = JSON.parse(rawContent.substring(rawContent.indexOf('['), rawContent.lastIndexOf(']') + 1));
                
                document.querySelectorAll('.column').forEach(c => c.innerHTML = `<h4>${c.id.replace('col-', '')}S</h4>`);
                arr.forEach(a => {
                    const col = document.getElementById(`col-${a.type.toUpperCase()}`);
                    if (col) col.innerHTML += `<div class="asset-card">${a.title?.en || a.title} <em>(${a.date})</em></div>`;
                });
            } catch (e) { console.log("Load error: " + e.message); }
        }

        async function dispatch() {
            const token = document.getElementById('token').value;
            const res = await fetch(API_URL, { headers: { "Authorization": `token ${token}` } });
            const data = await res.json();
            const rawContent = safeDecode(data.content.replace(/\n/g, ''));
            let arr = JSON.parse(rawContent.substring(rawContent.indexOf('['), rawContent.lastIndexOf(']') + 1));
            
            arr.unshift({ 
                id: `a-${Date.now()}`, date: new Date().toISOString().split('T')[0], 
                type: document.getElementById('type').value.toUpperCase(), 
                title: { en: document.getElementById('title').value }, 
                payload: document.getElementById('payload').value 
            });

            await fetch(API_URL, { 
                method: "PUT", 
                headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" }, 
                body: JSON.stringify({ message: "Dispatch", content: safeBase64(`const clientWorkspaceData = ${JSON.stringify(arr, null, 4)};`), sha: data.sha }) 
            });
            loadCatalog();
        }
    </script>
</body>
</html>
